kind = "web"
previewPath = "/"
title = "Toý Mekan — Premium Toý Mekany"
version = "1.0.0"
id = "artifacts/toy-makon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19903

[services.development]
run = "PORT=19903 BASE_PATH=/ pnpm --filter @workspace/toy-makon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toy-makon", "run", "build" ]
publicDir = "artifacts/toy-makon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19903"
BASE_PATH = "/"
